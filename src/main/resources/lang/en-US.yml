# WooHolograms English Language File
# English language file for WooHolograms

prefix: "&a[WooHolograms] &r"

# General messages
general:
  no-permission: "&cYou don't have permission to do this!"
  player-only: "&cThis command can only be executed by a player!"
  hologram-not-found: "&cHologram {name} not found!"
  hologram-exists: "&cHologram {name} already exists!"
  invalid-location: "&cInvalid location!"
  invalid-material: "&cInvalid material!"
  invalid-number: "&cInvalid number!"
  invalid-page: "&cInvalid page number!"
  config-reloaded: "&aConfiguration reloaded!"
  plugin-disabled: "&cPlugin is disabled!"
  world-not-found: "&cWorld {world} not found!"

# Create related
create:
  success: "&aCreated hologram {name}!"
  usage: "&cUsage: /hologram create <name> [type]"
  at-location: "&aCreated hologram {name} at your location!"

# Delete related
delete:
  success: "&aDeleted hologram {name}!"
  usage: "&cUsage: /hologram delete <name>"
  confirm: "&eAre you sure you want to delete {name}? Type /hologram delete {name} to confirm."
  cancelled: "&cDelete operation cancelled."

# Edit related
edit:
  usage: "&cUsage: /hologram edit <name> <action> [args]"
  line-set: "&aLine {line} has been set!"
  line-added: "&aNew line added!"
  line-removed: "&aLine {line} removed!"
  line-inserted: "&aNew line inserted at line {line}!"
  position-updated: "&aHologram position updated!"
  height-set: "&aLine height set to {height}!"
  range-set: "&aDisplay range set to {range}!"

# List related
list:
  header: "&e========== Hologram List =========="
  format: "&7- &f{name} &8({type}) &7@ {world}, {x}, {y}, {z}"
  empty: "&7No holograms"
  footer: "&eTotal: {count} holograms"
  page-info: "&ePage {page} of {total}"

# Move related
move:
  success: "&aMoved hologram {name} to your location!"
  usage: "&cUsage: /hologram move <name>"
  here: "&aHologram moved here!"

# Line related
line:
  usage: "&cUsage: /hologram line <name> <add|set|remove|insert> [line] [content]"
  added: "&aAdded line: {content}"
  set: "&aSet line {line}: {content}"
  removed: "&aRemoved line {line}"
  inserted: "&aInserted at line {line}: {content}"
  invalid-index: "&cInvalid line index!"
  offset-set: "&aSet line {line} offset to {offset}!"
  yaw-set: "&aSet line {line} yaw to {yaw}!"
  pitch-set: "&aSet line {line} pitch to {pitch}!"

# Page related
page:
  usage: "&cUsage: /hologram page <name> <add|remove|switch> [page]"
  added: "&aAdded new page!"
  removed: "&aRemoved page {page}!"
  switched: "&aSwitched to page {page}!"
  next: "&aSwitched to next page!"
  prev: "&aSwitched to previous page!"
  no-pages: "&cNo more pages!"

# Copy related
copy:
  success: "&aCopied hologram {source} to {target}!"
  usage: "&cUsage: /hologram copy <source> <target>"

# GUI related
gui:
  title-list: "&bHologram List"
  title-edit: "&bEdit: {name}"
  title-create: "&bCreate Hologram"
  previous-page: "&ePrevious Page"
  next-page: "&eNext Page"
  close: "&cClose"
  create-new: "&aCreate New"
  delete-hologram: "&cDelete Hologram"
  edit-lines: "&eEdit Lines"
  edit-position: "&eMove Position"
  edit-settings: "&7Settings"
  back: "&7Back"
  line-offset: "&eSet Offset"
  line-rotation: "&eSet Rotation"
  line-height: "&eSet Height"
  line-brightness: "&eSet Brightness"
  line-permission: "&eSet Permission"

# Type names
types:
  text: "Text"
  item: "Item"
  head: "Head"
  block: "Block"
  entity: "Entity"

# Action related
action:
  usage: "&cUsage: /hologram action <name> <add|remove|list> [click-type] [action]"
  added: "&aAdded action: {action}"
  removed: "&aRemoved action #{index}!"
  list-header: "&eAction List:"
  list-format: "&7{index}. &f{action}"
  invalid-click-type: "&cInvalid click type!"
  type-command: "Command"
  type-console: "Console Command"
  type-message: "Message"
  type-sound: "Sound"
  type-teleport: "Teleport"
  type-server: "Server Connect"
  type-next-page: "Next Page"
  type-prev-page: "Previous Page"
  type-page: "Go to Page"

# Click types
click-types:
  left: "Left Click"
  right: "Right Click"
  shift_left: "Shift+Left Click"
  shift_right: "Shift+Right Click"
  any: "Any"

# Animation related
animation:
  wave: "Wave"
  typewriter: "Typewriter"
  blink: "Blink"
  scroll: "Scroll"
  gradient: "Gradient"
  custom: "Custom"

# Convert related
convert:
  usage: "&cUsage: /wh convert <holographicdisplays|hd>"
  unknown-source: "&cUnknown convert source: {source}"
  hd-not-found: "&cHolographicDisplays data directory not found!"
  hd-v3-unsupported: "&cHolographicDisplays 3.x (database storage) import is not supported yet!"
  hd-no-data: "&cNo importable data found in HolographicDisplays directory!"
  hd-start: "&eStarting import from HolographicDisplays, {count} file(s) found..."
  hd-result: "&aImport complete! Imported: {imported}, Skipped: {skipped}, Failed: {failed}"

# Debug messages
debug:
  enabled: "&eDebug mode enabled"
  disabled: "&eDebug mode disabled"
  hologram-info: "&eHologram info: {info}"
  viewer-count: "&eCurrent viewer count: {count}"

# Flag related
flag:
  invalid-flag: "&cInvalid flag: {flag}! Available flags: disable_placeholders, disable_updating, disable_animations, disable_actions, always_face_player, clickable"
  invalid-line: "&cInvalid line number: {line}!"
  already-has-flag: "&cLine {line} already has flag {flag}!"
  already-has-flag-holo: "&cHologram {name} already has flag {flag}!"
  not-has-flag: "&cLine {line} does not have flag {flag}!"
  not-has-flag-holo: "&cHologram {name} does not have flag {flag}!"
  added-holo: "&aAdded flag {flag} to hologram {name}!"
  added-line: "&aAdded flag {flag} to line {line}!"
  removed-holo: "&aRemoved flag {flag} from hologram {name}!"
  removed-line: "&aRemoved flag {flag} from line {line}!"

# Profiler
profiler:
  header: "&e========== Profiler =========="
  no-data: "&7No data"
  not-enabled: "&eProfiler is not enabled. Use /wh profiler on to enable"
  enabled: "&aProfiler enabled"
  disabled: "&eProfiler disabled, statistics cleared"
  reset: "&aProfiler statistics reset"
  usage: "&cUsage: /wh profiler [on|off|reset]"

# Display Entity properties
display:
  scale-set: "&aScale set to ({x}, {y}, {z})!"
  scale-set-line: "&aLine {line} scale set to ({x}, {y}, {z})!"
  shadow-set: "&aShadow set to (radius: {radius}, strength: {strength})!"
  shadow-set-line: "&aLine {line} shadow set to (radius: {radius}, strength: {strength})!"
  glow-color-set: "&aGlow color set to {color}!"
  glow-color-set-line: "&aLine {line} glow color set to {color}!"
  glow-color-reset: "&aGlow color reset!"
  glow-color-reset-line: "&aLine {line} glow color reset!"
  invalid-color: "&cInvalid color format! Use #RRGGBB or color name (red, green, blue, etc.)"
  chroma-background-set: "&aChroma background set to {value}!"
  chroma-background-set-line: "&aLine {line} chroma background set to {value}!"
  chroma-glow-set: "&aChroma glow set to {value}!"
  chroma-glow-set-line: "&aLine {line} chroma glow set to {value}!"
