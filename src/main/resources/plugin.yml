name: WooHolograms
version: ${project.version}
main: com.oolonghoo.holograms.WooHolograms
api-version: '1.21'
folia-supported: true
author: oolongho
description: A hologram plugin for Paper/Folia 1.21+

softdepend:
  - PlaceholderAPI
  - HeadDatabase
  - DecentHolograms

provides:
  - DecentHolograms

commands:
  wooholograms:
    description: 全息图管理命令
    usage: /wooholograms <create|delete|edit|list|move|line|reload|help>
    permission: wooholograms.admin
    aliases: [holo, wh, hologram]

permissions:
  wooholograms.admin:
    description: 管理员权限（包含所有子权限）
    default: op
    children:
      wooholograms.command.*: true
  wooholograms.use:
    description: 基本使用权限
    default: true
  wooholograms.command.*:
    description: 所有命令权限
    default: op
    children:
      wooholograms.command.create: true
      wooholograms.command.delete: true
      wooholograms.command.copy: true
      wooholograms.command.near: true
      wooholograms.command.enable: true
      wooholograms.command.disable: true
      wooholograms.command.list: true
      wooholograms.command.info: true
      wooholograms.command.teleport: true
      wooholograms.command.movehere: true
      wooholograms.command.moveto: true
      wooholograms.command.addline: true
      wooholograms.command.removeline: true
      wooholograms.command.setline: true
      wooholograms.command.insertline: true
      wooholograms.command.addpage: true
      wooholograms.command.removepage: true
      wooholograms.command.swappage: true
      wooholograms.command.setrange: true
      wooholograms.command.setinterval: true
      wooholograms.command.setpermission: true
      wooholograms.command.setfacing: true
      wooholograms.command.setdoublesided: true
      wooholograms.command.addaction: true
      wooholograms.command.deleteaction: true
      wooholograms.command.actions: true
      wooholograms.command.offset: true
      wooholograms.command.height: true
      wooholograms.command.reload: true
      wooholograms.command.setpage: true
      wooholograms.command.gui: true
      wooholograms.command.convert: true
      wooholograms.command.help: true
      wooholograms.command.profiler: true
      wooholograms.command.addflag: true
      wooholograms.command.removeflag: true
      wooholograms.command.setscale: true
      wooholograms.command.setshadow: true
      wooholograms.command.setglowcolor: true
      wooholograms.command.setchroma: true
